<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexServ – Cobro</title>
</head>
<body>

<form id="cobroForm">
  <input type="text"   id="nombre"   placeholder="Nombre" />
  <input type="text"   id="concepto" placeholder="Concepto" />
  <input type="number" id="monto"    placeholder="Monto" />
  <button type="submit">Cobrar</button>
</form>

<div id="mensaje"></div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/TU_ID/exec";

  document.getElementById("cobroForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const nombre   = document.getElementById("nombre").value;
    const concepto = document.getElementById("concepto").value;
    const monto    = document.getElementById("monto").value;

    const payload = { nombre, concepto, monto };

    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      document.getElementById("mensaje").textContent = data.message || "Cobro registrado.";
    } catch (err) {
      document.getElementById("mensaje").textContent = "Error al procesar el cobro.";
    }
  });
</script>

</body>
</html>
